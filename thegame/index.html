<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Engine</title>
    <!-- Tell Trunk to build the lib target (WASM entry point), not the native [[bin]] -->
    <link data-trunk rel="rust" data-target-name="thegame" />
    <link data-trunk rel="copy-file" href="./main.js" />
    <link data-trunk rel="copy-dir" href="../assets" />
    <style>
        /* Remove all default spacing so the canvas fills the viewport */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #canvas-wrapper {
            position: relative;
            aspect-ratio: 16 / 9;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            /* contain children within 16:9 box */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            aspect-ratio: 16 / 9;
            object-fit: contain;
        }

        #fullscreen-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            opacity: 0;
            /* hidden until hover */
            transition: opacity 0.2s;
        }

        #canvas-wrapper:hover #fullscreen-btn {
            opacity: 1;
        }

        /* When in fullscreen, canvas fills the whole screen */
        #canvas-wrapper:fullscreen {
            width: 100vw;
            height: 100vh;
            max-width: unset;
            max-height: unset;
            background: #000;
        }

        /* Firefox prefix */
        #canvas-wrapper:-moz-full-screen {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="canvas-wrapper">
        <canvas id="canvas"></canvas>
        <button id="fullscreen-btn" title="Toggle Fullscreen">⛶</button>
    </div>
    <script type="module" src="./main.js"></script>
</body>

</html>
